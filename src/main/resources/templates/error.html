<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erreur - Jeu de Cartes</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

<div class="bg-white p-8 rounded-2xl shadow-xl max-w-lg w-full border-t-8 border-red-500">
  <div class="text-center">
    <div class="text-6xl mb-4"><i class="fa-solid fa-triangle-exclamation text-6xl mb-4 text-red-500"></i></div>
    <h1 class="text-3xl font-bold text-slate-800 mb-2">Une erreur est survenue</h1>
    <p class="text-slate-600 mb-6">L'application a intercepté une anomalie technique.</p>
  </div>

  <div th:if="${apiError}" class="bg-slate-50 rounded-lg p-4 mb-6 text-sm space-y-3 border border-slate-200">
    <div class="flex justify-between">
      <span class="font-semibold text-slate-500">Horodatage:</span>
      <span th:text="${#temporals.format(apiError.timestamp(), 'yyyy-MM-dd HH:mm:ss')}"></span>
    </div>
    <div class="flex justify-between">
      <span class="font-semibold text-slate-500">Statut:</span>
      <span class="font-mono text-red-600" th:text="${apiError.status()} + ' (' + ${apiError.error()} + ')'"></span>
    </div>
    <div class="border-t pt-2 mt-2">
      <span class="font-semibold text-slate-500 block mb-1">Message:</span>
      <p class="text-red-700 italic" th:text="${apiError.message()}"></p>
    </div>
    <div class="border-t pt-2 mt-2">
      <span class="font-semibold text-slate-500 block mb-1">Chemin:</span>
      <code class="text-xs bg-slate-200 px-2 py-1 rounded" th:text="${apiError.path()}"></code>
    </div>
  </div>

  <div class="text-center">
    <a th:href="@{/random-hand-cards}"
       class="inline-block bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-blue-700 transition">
      Retour à l'accueil
    </a>
  </div>
</div>

</body>
</html>
